<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="860" viewBox="0 0 1800 860" role="img" aria-labelledby="title desc">
  <title id="title">DataLex 10-second architecture flow</title>
  <desc id="desc">A simple numbered flow: dbt evidence, AI proposal pack, human review, certified contracts, DataLex manifest, and downstream consumers.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .title { fill: #111827; font: 700 46px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 400 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #64748b; font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.4px; }
      .card { stroke-width: 3; rx: 24; }
      .source { fill: #fff7ed; stroke: #d97706; }
      .ai { fill: #eef2ff; stroke: #4f46e5; }
      .review { fill: #fdf2f8; stroke: #db2777; }
      .cert { fill: #eff6ff; stroke: #2563eb; }
      .output { fill: #ecfdf5; stroke: #059669; }
      .num { fill: #111827; font: 800 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cardTitle { fill: #111827; font: 700 25px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cardText { fill: #334155; font: 400 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .noteStrong { fill: #111827; font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #334155; font: 500 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="860"/>
  <text x="80" y="86" class="title">DataLex: from dbt evidence to certified business meaning</text>
  <text x="80" y="128" class="subtitle">Read the flow left to right. AI drafts the governance work; humans decide what becomes trusted.</text>

  <text x="118" y="210" class="label">EVIDENCE</text>
  <text x="446" y="210" class="label">AI DRAFT</text>
  <text x="768" y="210" class="label">HUMAN TRUST GATE</text>
  <text x="1128" y="210" class="label">CERTIFIED ASSETS</text>
  <text x="1478" y="210" class="label">HANDOFF</text>

  <rect x="80" y="242" width="270" height="210" class="card source"/>
  <circle cx="122" cy="284" r="26" fill="#fed7aa"/>
  <text x="114" y="293" class="num">1</text>
  <text x="122" y="338" class="cardTitle">dbt evidence</text>
  <text x="122" y="382" class="cardText">Models, YAML, metrics,</text>
  <text x="122" y="416" class="cardText">tests, exposures, owners</text>

  <rect x="412" y="242" width="270" height="210" class="card ai"/>
  <circle cx="454" cy="284" r="26" fill="#c7d2fe"/>
  <text x="446" y="293" class="num">2</text>
  <text x="454" y="338" class="cardTitle">AI proposal pack</text>
  <text x="454" y="382" class="cardText">Candidate domains, terms,</text>
  <text x="454" y="416" class="cardText">contracts, assumptions</text>

  <rect x="744" y="242" width="270" height="210" class="card review"/>
  <circle cx="786" cy="284" r="26" fill="#fbcfe8"/>
  <text x="778" y="293" class="num">3</text>
  <text x="786" y="338" class="cardTitle">Human review</text>
  <text x="786" y="382" class="cardText">Validate grain, owner,</text>
  <text x="786" y="416" class="cardText">source and risk</text>

  <rect x="1076" y="242" width="270" height="210" class="card cert"/>
  <circle cx="1118" cy="284" r="26" fill="#bfdbfe"/>
  <text x="1110" y="293" class="num">4</text>
  <text x="1118" y="338" class="cardTitle">Certified contracts</text>
  <text x="1118" y="382" class="cardText">Accepted definitions</text>
  <text x="1118" y="416" class="cardText">stored in Git</text>

  <rect x="1408" y="242" width="270" height="210" class="card cert"/>
  <circle cx="1450" cy="284" r="26" fill="#bfdbfe"/>
  <text x="1442" y="293" class="num">5</text>
  <text x="1450" y="338" class="cardTitle">DataLex manifest</text>
  <text x="1450" y="382" class="cardText">Only certified meaning</text>
  <text x="1450" y="416" class="cardText">is published</text>

  <path class="arrow" d="M350 347 L412 347"/>
  <path class="arrow" d="M682 347 L744 347"/>
  <path class="arrow" d="M1014 347 L1076 347"/>
  <path class="arrow" d="M1346 347 L1408 347"/>

  <line x1="1543" y1="452" x2="1543" y2="536" stroke="#64748b" stroke-width="4"/>
  <path class="arrow" d="M1543 536 L1212 536 L1212 592"/>
  <path class="arrow" d="M1543 536 L1543 592"/>

  <rect x="1038" y="592" width="348" height="138" class="card output"/>
  <text x="1076" y="644" class="cardTitle">DQL blocks</text>
  <text x="1076" y="686" class="cardText">Contract-bound trusted answers</text>

  <rect x="1408" y="592" width="348" height="138" class="card output"/>
  <text x="1446" y="644" class="cardTitle">Agents and catalogs</text>
  <text x="1446" y="686" class="cardText">Read governed context</text>

  <rect x="80" y="766" width="1676" height="62" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="118" y="806" class="noteStrong">10-second takeaway:</text>
  <text x="338" y="806" class="note">DataLex is the business-definition gate above dbt: AI drafts, humans certify, the manifest hands trust to downstream tools.</text>
</svg>
