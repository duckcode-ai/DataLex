name: web-app e2e

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/web-app/**"
      - "packages/api-server/**"
      - "packages/core_engine/**"
      - ".github/workflows/e2e-tests.yml"

jobs:
  unit:
    name: web-app unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web-app/package-lock.json
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright on jaffle-shop clone
    needs: unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/web-app/package-lock.json
            packages/api-server/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # DataLex core_engine is needed by /api/dbt/import. The Python
      # project root lives at the repo top-level (pyproject.toml); the
      # `datalex_core` package is resolved via the setuptools package
      # discovery declared there.
      - name: Install datalex-cli (core_engine + CLI)
        working-directory: .
        run: pip install -e .
      - name: Install api-server deps
        working-directory: packages/api-server
        run: npm ci
      - name: Install web-app deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build web-app (sanity check)
        run: npm run build
      - name: Run E2E suite
        env:
          CI: "1"
          DM_ENABLE_DIRECT_APPLY: "1"
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web-app/playwright-report/
          retention-days: 14
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: packages/web-app/test-results/
          retention-days: 7
